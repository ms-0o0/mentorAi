version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest   # Ollama 공식 이미지라고 가정
    container_name: ollama
    ports:
      - "11434:11434"             # Ollama 기본 포트
    restart: unless-stopped

  rag-mentor:
    build: .
    container_name: rag-mentor
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./temp:/app/temp          # FAISS 캐시 공유