version: "3.9"

networks:
  app_net:
    driver: bridge

volumes:
  ollama_data:

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - app_net
    volumes:
      - ollama_data:/root/.ollama   # 다운로드 받은 LLM 모델이 증발하지 않도록 저장소 마운트

  rag-mentor:
    build: .
    container_name: rag-mentor
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - app_net
    volumes:
      - ./temp:/app/temp